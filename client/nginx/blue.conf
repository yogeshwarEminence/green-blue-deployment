server {
    listen 80;

    root /usr/share/nginx/html;

    # Serve the React application
    location / {
        try_files $uri /index.html;
    }

    # Forward API requests to the Blue backend
    location /api/ {
        proxy_pass http://backend-blue:4001/api/;
    }

    # Health check endpoint
    location /healthz {
        return 200 "OK";
    }
}