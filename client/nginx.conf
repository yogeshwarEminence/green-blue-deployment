server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # API requests are forwarded to the backend container over the
    # Docker network, using the service name "backend" (not localhost).
    # This is what lets the browser call same-origin "/api/..." URLs
    # while nginx does the cross-container routing behind the scenes.
    location /api/ {
        proxy_pass http://backend:4000/api/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # React Router / client-side routing fallback
    location / {
        try_files $uri $uri/ /index.html;
    }
}
