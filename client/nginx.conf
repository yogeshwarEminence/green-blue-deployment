server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # Serve pre-compressed assets if available
    gzip on;
    gzip_types text/plain text/css application/javascript application/json image/svg+xml;

    # Support React Router / SPA client-side routing:
    # any path that isn't a real file falls back to index.html
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Simple endpoint the ALB (or Docker healthcheck) can hit later
    location /healthz {
        access_log off;
        return 200 "ok\n";
        add_header Content-Type text/plain;
    }
}
