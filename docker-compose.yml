services:
  postgres:
    image: postgres:16-alpine
    container_name: employee-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: employee_db
    ports:
      # Exposed to the host too, purely so you can connect with a DB client
      # (psql, DBeaver, etc.) while learning. Not required by the app itself.
      - "5432:5432"
    volumes:
      # Named volume: PostgreSQL's actual data files persist here across
      # `docker compose down` / container recreation.
      - pgdata:/var/lib/postgresql/data
      # Bind mount: runs once, only when the volume above is empty,
      # to create the table and insert the seed rows.
      - ./db/schema.sql:/docker-entrypoint-initdb.d/schema.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d employee_db"]
      interval: 5s
      timeout: 5s
      retries: 10
    networks:
      - app-network

  backend:
    build:
      context: ./server
      dockerfile: Dockerfile
    container_name: employee-backend
    restart: unless-stopped
    environment:
      PORT: 4000
      DB_HOST: postgres      # <-- Docker service name, NOT localhost
      DB_PORT: 5432
      DB_USER: postgres
      DB_PASSWORD: postgres
      DB_NAME: employee_db
    ports:
      # Published to the host so the browser (running outside Docker)
      # can reach the API directly at http://localhost:4000.
      - "4000:4000"
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - app-network

  frontend:
    build:
      context: ./client
      dockerfile: Dockerfile
      args:
        # Baked into the JS bundle at BUILD time. Must be an address the
        # BROWSER can reach - the browser is not part of the Docker
        # network, so "http://backend:4000" would not resolve for it.
        VITE_API_URL: http://localhost:4000
    container_name: employee-frontend
    restart: unless-stopped
    ports:
      - "80:80"
    depends_on:
      - backend
    networks:
      - app-network

networks:
  app-network:
    driver: bridge

volumes:
  pgdata:
