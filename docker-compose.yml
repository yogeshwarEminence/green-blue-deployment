version: "3.9"

services:

  postgres:
    image: postgres:16-alpine
    container_name: employee-postgres

    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: employee_management

    ports:
      - "5432:5432"

    volumes:
      # Named volume: keeps employee data on disk across container restarts
      - postgres-data:/var/lib/postgresql/data
      # Runs once, only when the volume above is empty (fresh database)
      - ./database/schema.sql:/docker-entrypoint-initdb.d/schema.sql

    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d employee_management"]
      interval: 5s
      timeout: 5s
      retries: 10

    networks:
      - employee-network

  backend:
    build: ./server
    container_name: employee-backend

    depends_on:
      postgres:
        condition: service_healthy

    environment:
      PORT: 4000
      # "postgres" is the service name above — Docker's internal DNS
      # resolves it to the postgres container's IP on this network.
      DB_HOST: postgres
      DB_PORT: 5432
      DB_USER: postgres
      DB_PASSWORD: postgres
      DB_NAME: employee_management
      CORS_ORIGIN: http://localhost

    ports:
      # Published so you can call the API directly at localhost:4000
      # while developing the frontend outside Docker, if you want to.
      - "4000:4000"

    networks:
      - employee-network

  frontend:
    build: ./client
    container_name: employee-frontend

    depends_on:
      - backend

    ports:
      - "80:80"

    networks:
      - employee-network

networks:
  employee-network:
    driver: bridge

volumes:
  postgres-data:
